name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check + build
        run: npm run build
        env:
          # The app reads these at request time, not build time — dummy values
          # just keep any accidental import-time checks happy.
          SESSION_SECRET: ci-placeholder-secret
          NEXT_TELEMETRY_DISABLED: '1'
