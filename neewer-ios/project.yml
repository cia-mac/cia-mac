name: Glow
options:
  bundleIdPrefix: com.ciamac
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  Glow:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ciamac.glow
        PRODUCT_NAME: Glow
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Glow
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Glow uses Bluetooth to discover and control your Neewer lights."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
